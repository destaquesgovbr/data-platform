# Scraper API - Build, Push and Deploy to Cloud Run
name: Deploy Scraper API

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/data_platform/api.py'
      - 'src/data_platform/scrapers/**'
      - 'src/data_platform/managers/**'
      - 'src/data_platform/models/**'
      - 'docker/scraper-api/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/scraper-api-deploy.yaml'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/destaquesgovbr/scraper-api
  CLOUD_RUN_SERVICE: destaquesgovbr-scraper-api
  CLOUD_RUN_REGION: southamerica-east1
  PROJECT_ID: inspire-7-finep

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the image
        run: |
          docker build -f docker/scraper-api/Dockerfile \
            -t ${{ env.IMAGE }}:latest \
            -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to Cloud Run
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/990583792367/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@inspire-7-finep.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --set-secrets "DATABASE_URL=govbrnews-postgres-connection-string:latest" \
            --set-env-vars "STORAGE_BACKEND=postgres,PYTHONUNBUFFERED=1" \
            --port 8080 \
            --timeout 900 \
            --concurrency 1 \
            --min-instances 0 \
            --max-instances 10 \
            --memory 1Gi \
            --cpu 1

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --format="value(status.url)")
          echo "Scraper API deployed at: $URL"
          echo "## Scraper API Deployed" >> $GITHUB_STEP_SUMMARY
          echo "URL: $URL" >> $GITHUB_STEP_SUMMARY
