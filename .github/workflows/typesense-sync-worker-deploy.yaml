name: Deploy Typesense Sync Worker

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/data_platform/workers/typesense_sync/**'
      - 'docker/typesense-sync-worker/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/typesense-sync-worker-deploy.yaml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: destaquesgovbr/reusable-workflows/.github/workflows/cloud-run-deploy.yml@v2
    with:
      dockerfile: docker/typesense-sync-worker/Dockerfile
      ar_repository: destaquesgovbr-typesense-sync-worker
      image_name: typesense-sync-worker
      cloud_run_service: destaquesgovbr-typesense-sync-worker
