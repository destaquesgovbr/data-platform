# Cloud Composer DAGs Deployment
# Automatically deploys DAGs to Cloud Composer when changes are pushed to main

name: Deploy DAGs to Composer

on:
  push:
    branches:
      - main
    paths:
      - 'src/data_platform/dags/**'
  workflow_dispatch:
    inputs:
      test_connections:
        description: 'Test Airflow connections after deploy'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: inspire-7-finep
  COMPOSER_ENVIRONMENT: destaquesgovbr-composer
  COMPOSER_REGION: us-central1

jobs:
  deploy:
    uses: destaquesgovbr/reusable-workflows/.github/workflows/composer-deploy-dags.yml@v1
    with:
      dags_local_path: src/data_platform/dags
      dags_bucket_subdir: data-platform
      check_imports: true
      rsync_exclude: 'requirements\.txt$'

  cleanup:
    name: Clean stale artifacts
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/990583792367/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@inspire-7-finep.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Get Composer DAGs bucket
        id: composer
        run: |
          DAGS_BUCKET=$(gcloud composer environments describe ${{ env.COMPOSER_ENVIRONMENT }} \
            --location=${{ env.COMPOSER_REGION }} \
            --format="value(config.dagGcsPrefix)")
          echo "dags_bucket=$DAGS_BUCKET" >> $GITHUB_OUTPUT

      - name: Clean stale plugins
        run: |
          # DAGs now call Cloud Run API via HTTP - no local source code needed in plugins/
          PLUGINS_BUCKET=$(echo "${{ steps.composer.outputs.dags_bucket }}" | sed 's|/dags$|/plugins|')
          if gsutil ls "$PLUGINS_BUCKET/data_platform/" > /dev/null 2>&1; then
            echo "Removing stale data_platform code from plugins/..."
            gsutil -m rm -r "$PLUGINS_BUCKET/data_platform/" || true
            echo "Stale plugins removed!"
          else
            echo "No stale plugins found, skipping cleanup"
          fi

      - name: Clean up legacy root-level DAGs (one-time migration)
        run: |
          BUCKET="${{ steps.composer.outputs.dags_bucket }}"
          echo "Cleaning up legacy root-level DAGs..."
          for f in scrape_agencies.py scrape_ebc.py sync_postgres_to_huggingface.py test_postgres_connection.py; do
            gsutil rm "$BUCKET/$f" 2>/dev/null && echo "  Removed $f" || true
          done
          gsutil rm -r "$BUCKET/config/" 2>/dev/null && echo "  Removed config/" || true
          echo "Legacy cleanup done"

  test-connections:
    name: Test Airflow Connections
    needs: deploy
    if: github.event.inputs.test_connections == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/990583792367/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@inspire-7-finep.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Test postgres_default connection
        run: |
          echo "Testing postgres_default connection..."
          gcloud composer environments run ${{ env.COMPOSER_ENVIRONMENT }} \
            --location=${{ env.COMPOSER_REGION }} \
            connections test -- postgres_default || echo "Connection test completed"

      - name: List all connections
        run: |
          echo "Listing Airflow connections..."
          gcloud composer environments run ${{ env.COMPOSER_ENVIRONMENT }} \
            --location=${{ env.COMPOSER_REGION }} \
            connections list 2>/dev/null || echo "Connections listed"
