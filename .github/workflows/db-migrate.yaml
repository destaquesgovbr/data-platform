name: Database Migration

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Migration command to execute'
        required: true
        type: choice
        options:
          - status
          - migrate
          - rollback
          - history
          - validate
      dry_run:
        description: 'Preview changes without applying (default: true)'
        required: false
        type: boolean
        default: true
      target_version:
        description: 'Target version for migrate (--target) or rollback (VERSION)'
        required: false
        type: string
      confirm:
        description: 'Required for migrate/rollback with dry_run=false'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: inspire-7-finep
  CLOUD_SQL_INSTANCE: inspire-7-finep:southamerica-east1:destaquesgovbr-postgres
  CLOUD_SQL_PROXY_VERSION: v2.14.3

jobs:
  validate-inputs:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation for destructive operations
        run: |
          COMMAND="${{ inputs.command }}"
          DRY_RUN="${{ inputs.dry_run }}"
          CONFIRM="${{ inputs.confirm }}"

          echo "## Migration Request" >> $GITHUB_STEP_SUMMARY
          echo "- **Command:** $COMMAND" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run:** $DRY_RUN" >> $GITHUB_STEP_SUMMARY
          echo "- **Target version:** ${{ inputs.target_version || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Confirm:** $CONFIRM" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

          if [[ "$COMMAND" == "migrate" || "$COMMAND" == "rollback" ]]; then
            if [[ "$DRY_RUN" == "false" && "$CONFIRM" != "true" ]]; then
              echo "::error::Destructive operation requires confirm=true when dry_run=false"
              exit 1
            fi
          fi

          if [[ "$COMMAND" == "rollback" && -z "${{ inputs.target_version }}" ]]; then
            echo "::error::rollback requires target_version"
            exit 1
          fi

  backup:
    name: Create Backup
    needs: validate-inputs
    if: >-
      inputs.command == 'migrate' || inputs.command == 'rollback'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Create on-demand backup
        run: |
          DESCRIPTION="pre-${{ inputs.command }}-$(date +%Y%m%d-%H%M%S)"
          DESCRIPTION="${DESCRIPTION:0:100}"
          echo "Creating backup: $DESCRIPTION"
          gcloud sql backups create \
            --instance=destaquesgovbr-postgres \
            --description="$DESCRIPTION" \
            --project=${{ env.PROJECT_ID }}

      - name: Verify backup
        run: |
          BACKUP=$(gcloud sql backups list \
            --instance=destaquesgovbr-postgres \
            --project=${{ env.PROJECT_ID }} \
            --limit=1 \
            --format="table(id,status,startTime,description)")
          echo "$BACKUP"
          echo "## Backup Created" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$BACKUP" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  run-migration:
    name: Run Migration
    needs: [validate-inputs, backup]
    if: always() && needs.validate-inputs.result == 'success' && (needs.backup.result == 'success' || needs.backup.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Install Cloud SQL Proxy
        run: |
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/${{ env.CLOUD_SQL_PROXY_VERSION }}/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          sudo mv cloud-sql-proxy /usr/local/bin/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-interaction --only main

      - name: Fetch database credentials
        id: db
        run: |
          DB_URL=$(gcloud secrets versions access latest --secret=govbrnews-postgres-connection-string)
          echo "::add-mask::$DB_URL"
          echo "url=$DB_URL" >> $GITHUB_OUTPUT

      - name: Start Cloud SQL Proxy
        run: |
          cloud-sql-proxy ${{ env.CLOUD_SQL_INSTANCE }} --port=5432 &
          sleep 3
          if ! nc -z 127.0.0.1 5432; then
            echo "::error::Cloud SQL Proxy failed to start"
            exit 1
          fi
          echo "Cloud SQL Proxy started successfully"

      - name: Execute migration command
        env:
          DATABASE_URL: ${{ steps.db.outputs.url }}
        run: |
          LOCAL_URL=$(echo "$DATABASE_URL" | sed -E 's|@[^:]+:|@127.0.0.1:|')
          echo "::add-mask::$LOCAL_URL"

          COMMAND="${{ inputs.command }}"
          DRY_RUN="${{ inputs.dry_run }}"
          TARGET="${{ inputs.target_version }}"

          CMD="poetry run python scripts/migrate.py $COMMAND"

          case "$COMMAND" in
            status|history|validate)
              CMD="$CMD --db-url \"$LOCAL_URL\""
              ;;
            migrate)
              CMD="$CMD --db-url \"$LOCAL_URL\" --yes"
              if [ "$DRY_RUN" = "true" ]; then
                CMD="$CMD --dry-run"
              fi
              if [ -n "$TARGET" ]; then
                CMD="$CMD --target $TARGET"
              fi
              ;;
            rollback)
              CMD="poetry run python scripts/migrate.py rollback $TARGET --db-url \"$LOCAL_URL\" --yes"
              if [ "$DRY_RUN" = "true" ]; then
                CMD="$CMD --dry-run"
              fi
              ;;
          esac

          echo "Executing: $COMMAND (dry_run=$DRY_RUN, target=$TARGET)"
          eval $CMD

  show-status:
    name: Show Status
    needs: [validate-inputs, run-migration]
    if: always() && needs.run-migration.result != 'skipped'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Install Cloud SQL Proxy
        run: |
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/${{ env.CLOUD_SQL_PROXY_VERSION }}/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          sudo mv cloud-sql-proxy /usr/local/bin/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-interaction --only main

      - name: Fetch database credentials
        id: db
        run: |
          DB_URL=$(gcloud secrets versions access latest --secret=govbrnews-postgres-connection-string)
          echo "::add-mask::$DB_URL"
          echo "url=$DB_URL" >> $GITHUB_OUTPUT

      - name: Start Cloud SQL Proxy
        run: |
          cloud-sql-proxy ${{ env.CLOUD_SQL_INSTANCE }} --port=5432 &
          sleep 3

      - name: Show migration status
        env:
          DATABASE_URL: ${{ steps.db.outputs.url }}
        run: |
          LOCAL_URL=$(echo "$DATABASE_URL" | sed -E 's|@[^:]+:|@127.0.0.1:|')
          echo "::add-mask::$LOCAL_URL"

          echo "## Migration Status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          poetry run python scripts/migrate.py status --db-url "$LOCAL_URL" >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Recent History" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          poetry run python scripts/migrate.py history --db-url "$LOCAL_URL" --limit 10 >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY
